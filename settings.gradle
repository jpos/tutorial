pluginManagement {
    repositories {
        gradlePluginPortal()
        mavenCentral()
        maven { url = uri('https://jpos.org/maven') }
    }
}

rootProject.name = 'jpos-tutorials'

include 'tutorials:qbean-primer'
include 'tutorials:qbean-support'
include 'tutorials:qserver'
include 'tutorials:channel-adaptor'
include 'tutorials:qmux'
include 'tutorials:logon-manager'
include 'tutorials:muxpool'
include 'tutorials:transaction-manager'
